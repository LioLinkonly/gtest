<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G検定 学習クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e2e0db;
    --text-primary: #1a1917;
    --text-secondary: #6b6860;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --correct: #16a34a;
    --correct-light: #f0fdf4;
    --wrong: #dc2626;
    --wrong-light: #fef2f2;
    --tag-bg: #f1f0ed;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    width: 100%;
    max-width: 680px;
    box-shadow: var(--shadow);
  }

  /* Progress */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .q-counter {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .category-tag {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 99px;
    letter-spacing: 0.3px;
  }

  .question-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.65;
    margin-bottom: 24px;
    color: var(--text-primary);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .choice:disabled { cursor: default; }

  .choice.correct {
    border-color: var(--correct);
    background: var(--correct-light);
    color: var(--correct);
    font-weight: 700;
  }

  .choice.wrong {
    border-color: var(--wrong);
    background: var(--wrong-light);
    color: var(--wrong);
  }

  .choice-label {
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .choice.correct .choice-label {
    background: var(--correct);
    color: white;
  }

  .choice.wrong .choice-label {
    background: var(--wrong);
    color: white;
  }

  /* Explanation */
  .explanation {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-primary);
    display: none;
  }

  .explanation.show { display: block; }

  .explanation-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn {
    padding: 11px 22px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { opacity: 0.88; }

  .btn-secondary {
    background: var(--tag-bg);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Result screen */
  .result-screen { text-align: center; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 6px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .score-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .score-denom {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .result-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-msg {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .wrong-list {
    text-align: left;
    margin-top: 20px;
  }

  .wrong-list-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wrong-item {
    padding: 12px 14px;
    background: var(--wrong-light);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.5;
    border-left: 3px solid var(--wrong);
  }

  .wrong-item-cat {
    font-size: 11px;
    color: var(--wrong);
    font-weight: 700;
    margin-bottom: 3px;
  }

  /* Start screen */
  .start-screen { text-align: center; padding: 12px 0; }

  .start-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .start-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .start-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .start-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .start-meta-item {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  @media (max-width: 480px) {
    .card { padding: 20px 18px; }
    .question-text { font-size: 15px; }
    .choice { font-size: 14px; padding: 12px 14px; }
  }
  
  .notice {
  margin-top: 8px;
  padding: 6px 8px;
  font-size: 0.65rem;
  color: #777;
  background: #f8f9fa;
  border-radius: 6px;
  line-height: 1.3;
  text-align: left;
}
  
  
</style>
</head>
<body>

<header>
  <span class="logo">G検定</span>
  <span class="logo-sub">学習クイズ — 初級 / 全範囲</span>
</header>

<div class="card" id="app"></div>

<script>
const questions = [
  {
    category: "1-1 人工知能の定義",
    q: "人工知能（AI）の定義として最も適切なものはどれですか？",
    choices: [
      "人間と同じ外見を持つロボットに搭載されたシステム",
      "人間の知的な活動を模倣・代行するコンピュータシステム",
      "インターネット上のすべてのデータを管理するシステム",
      "数値計算を高速に処理するだけの演算装置"
    ],
    answer: 1,
    explanation: "AIとは、人間が行う知覚・推論・学習・言語理解などの知的活動をコンピュータで実現しようとする技術・システムの総称です。外見や見た目とは無関係です。"
  },
  {
    category: "1-2 人工知能研究の歴史",
    q: "AIの「第1次ブーム」に中心的に研究されたのはどの技術ですか？",
    choices: [
      "ディープラーニング",
      "ビッグデータ解析",
      "探索と推論",
      "クラウドコンピューティング"
    ],
    answer: 2,
    explanation: "1950〜60年代の第1次AIブームでは、迷路や数学の証明といった問題を解くための「探索・推論」技術が中心に研究されました。ディープラーニングは第3次ブームの技術です。"
  },
  {
    category: "2-3 エキスパートシステム",
    q: "エキスパートシステムの説明として正しいものはどれですか？",
    choices: [
      "大量のデータから自動的にルールを学習するシステム",
      "専門家の知識をルールとして記述し、問題を解決するシステム",
      "画像認識に特化したニューラルネットワーク",
      "複数のAIが互いに競い合って学習するシステム"
    ],
    answer: 1,
    explanation: "エキスパートシステムは、専門家の知識をIF-THENルールとして記述し、推論エンジンで問題を解決するシステムです。第2次AIブームで注目されましたが、ルールの記述に膨大なコストがかかる「知識獲得のボトルネック」が課題でした。"
  },
  {
    category: "3-1 教師あり学習",
    q: "教師あり学習の説明として正しいものはどれですか？",
    choices: [
      "ラベルなしデータからデータの構造やパターンを発見する手法",
      "正解ラベル付きデータを使ってモデルを訓練する手法",
      "試行錯誤を通じて報酬を最大化するように学習する手法",
      "複数のモデルを組み合わせて性能を上げる手法"
    ],
    answer: 1,
    explanation: "教師あり学習は、入力データと正解ラベルのペアを使いモデルを訓練します。例：メールのスパム分類（スパム/非スパムのラベルあり）。ラベルなしは教師なし学習、報酬最大化は強化学習です。"
  },
  {
    category: "3-4 モデルの評価",
    q: "機械学習モデルを評価する際の「過学習（オーバーフィッティング）」の説明として正しいのはどれですか？",
    choices: [
      "訓練データでも未知のデータでも精度が低い状態",
      "訓練データには高精度だが、未知のデータに対して精度が低い状態",
      "未知のデータには高精度だが、訓練データに対して精度が低い状態",
      "どちらのデータに対しても精度が非常に高い理想的な状態"
    ],
    answer: 1,
    explanation: "過学習とは、モデルが訓練データに適合しすぎて汎化能力を失った状態です。訓練データでは高精度でも未知データでは低精度になります。防止策としてドロップアウト、正則化、データ拡張などがあります。"
  },
  {
    category: "4-1 ニューラルネットワーク",
    q: "ニューラルネットワークにおける「層（レイヤー）」の構成として正しいのはどれですか？",
    choices: [
      "入力層・中間層（隠れ層）・出力層",
      "前処理層・計算層・後処理層",
      "特徴層・学習層・判定層",
      "データ層・ロジック層・表示層"
    ],
    answer: 0,
    explanation: "ニューラルネットワークは、入力層（データを受け取る）・中間層（隠れ層、特徴を抽出する）・出力層（結果を出力する）の3種類の層で構成されます。中間層を多く積み重ねたものがディープニューラルネットワークです。"
  },
  {
    category: "5-1 CNN",
    q: "畳み込みニューラルネットワーク（CNN）が特に得意とするタスクはどれですか？",
    choices: [
      "時系列データの予測",
      "画像認識・画像分類",
      "強化学習によるゲームプレイ",
      "テキストの機械翻訳"
    ],
    answer: 1,
    explanation: "CNNは画像の局所的な特徴を抽出する畳み込み演算を使うため、画像認識・画像分類・物体検出などの画像処理タスクに優れています。時系列はRNN、翻訳はTransformerが主に使われます。"
  },
  {
    category: "5-4 Transformer",
    q: "Transformerアーキテクチャの中心的な機構はどれですか？",
    choices: [
      "畳み込み（Convolution）",
      "再帰（Recurrence）",
      "自己注意機構（Self-Attention）",
      "カプセル（Capsule）"
    ],
    answer: 2,
    explanation: "Transformerは2017年にGoogleが発表したアーキテクチャで、Self-Attention（自己注意機構）によって入力の各要素間の関係を並列に計算します。GPT・BERTなど大規模言語モデルの基盤技術です。"
  },
  {
    category: "8-3 確率",
    q: "ベイズの定理の説明として正しいのはどれですか？",
    choices: [
      "2つの事象が独立である場合に同時確率を求める定理",
      "事前確率と尤度から事後確率を更新する定理",
      "大量のデータでは標本平均が母平均に収束する定理",
      "正規分布の平均と分散を推定する定理"
    ],
    answer: 1,
    explanation: "ベイズの定理は、P(A|B) = P(B|A)×P(A)/P(B) と表され、事前確率P(A)に新たな証拠Bを加えて事後確率P(A|B)を更新する考え方です。スパムフィルタやベイズ最適化などに応用されます。"
  },
  {
    category: "9-3 AI倫理",
    q: "AI倫理の観点から「説明可能なAI（XAI）」が求められる主な理由はどれですか？",
    choices: [
      "AIの処理速度を向上させるため",
      "AIが出した結論の根拠を人間が理解・検証できるようにするため",
      "AIが著作権を侵害しないようにするため",
      "AIのコストを削減するため"
    ],
    answer: 1,
    explanation: "説明可能なAI（XAI: Explainable AI）は、モデルがなぜその判断を下したのかを人間が理解できるようにする技術・考え方です。医療・金融・司法など高リスク分野での透明性・説明責任の確保のために重要視されています。"
  }
];

let current = 0;
let score = 0;
let wrongList = [];
let answered = false;
let mode = "start"; // start | quiz | result | review
let reviewQueue = [];
let reviewIndex = 0;
let isReview = false;

function render() {
  const app = document.getElementById("app");
  if (mode === "start") {
    app.innerHTML = `
      <div class="start-screen">
        <div class="start-icon">🤖</div>
        <div class="start-title">G検定 学習クイズアプリ</div>
        <div class="start-desc">G検定シラバス全範囲から初級問題を出題します。<br>各問題には解説付き。間違えた問題は後で復習できます。</div>
        <div class="start-meta">
          <span class="start-meta-item"><span class="dot"></span>全10問</span>
          <span class="start-meta-item"><span class="dot"></span>初級レベル</span>
          <span class="start-meta-item"><span class="dot"></span>解説あり</span>
          <span class="start-meta-item"><span class="dot"></span>復習モードあり</span>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;padding:14px;">クイズを始める</button>
        <div class="notice">
　　　　　　  <strong>(試作品)</strong><br>
           このアプリは、AIによるアプリ生成とGitHub Pages公開を試すために作成した試作アプリです。<br>
           問題・解説はAIが生成しているため、内容の正確性は保証していません。
　　　　　</div>
      </div>`;
    return;
  }

  if (mode === "result") {
    const pct = Math.round((score / questions.length) * 100);
    let msg = pct === 100 ? "完璧です！全問正解！🎉" :
              pct >= 70 ? "よくできました！あと一歩で満点です。" :
              pct >= 50 ? "もう少し復習しましょう。間違えた問題を確認してください。" :
              "基礎からしっかり復習しましょう。解説を読み返してみてください。";

    const wrongHTML = wrongList.length > 0 ? `
      <div class="wrong-list">
        <div class="wrong-list-title">❌ 間違えた問題 (${wrongList.length}問)</div>
        ${wrongList.map(i => `
          <div class="wrong-item">
            <div class="wrong-item-cat">${questions[i].category}</div>
            ${questions[i].q}
          </div>`).join("")}
      </div>` : `<div style="font-size:14px;color:var(--correct);font-weight:700;margin-top:8px;">🎉 全問正解！間違いはありませんでした。</div>`;

    app.innerHTML = `
      <div class="result-screen">
        <div class="score-circle">
          <div class="score-num">${score}</div>
          <div class="score-denom">/ ${questions.length}</div>
        </div>
        <div class="result-title">${pct}点</div>
        <div class="result-msg">${msg}</div>
        ${wrongHTML}
        <div class="btn-row" style="justify-content:center;flex-direction:column;gap:10px;margin-top:28px;">
          ${wrongList.length > 0 ? `<button class="btn btn-primary" onclick="startReview()" style="width:100%;">間違えた問題を復習する (${wrongList.length}問)</button>` : ""}
          <button class="btn btn-secondary" onclick="resetQuiz()" style="width:100%;">最初からやり直す</button>
        </div>
      </div>`;
    return;
  }

  if (mode === "review_done") {
    app.innerHTML = `
      <div class="result-screen">
        <div class="start-icon">✅</div>
        <div class="result-title">復習完了！</div>
        <div class="result-msg">すべての間違い問題を復習しました。<br>繰り返し練習して定着させましょう。</div>
        <div class="btn-row" style="justify-content:center;margin-top:24px;">
          <button class="btn btn-primary" onclick="resetQuiz()" style="width:100%;padding:14px;">最初からやり直す</button>
        </div>
      </div>`;
    return;
  }

  const q = isReview ? questions[reviewQueue[reviewIndex]] : questions[current];
  const total = isReview ? reviewQueue.length : questions.length;
  const idx = isReview ? reviewIndex : current;
  const progress = ((idx) / total) * 100;

  const choicesHTML = q.choices.map((c, i) => {
    let cls = "choice";
    if (answered) {
      if (i === q.answer) cls += " correct";
      else if (i === window._selected && i !== q.answer) cls += " wrong";
    }
    const labels = ["A","B","C","D"];
    return `<button class="${cls}" onclick="selectAnswer(${i})" ${answered ? "disabled" : ""}>
      <span class="choice-label">${labels[i]}</span>
      <span>${c}</span>
    </button>`;
  }).join("");

  const explanationHTML = `
    <div class="explanation ${answered ? "show" : ""}">
      <div class="explanation-label">解説</div>
      ${q.explanation}
    </div>`;

  const reviewBadge = isReview ? `<span style="font-size:11px;background:#fef3c7;color:#b45309;font-weight:700;padding:3px 8px;border-radius:99px;">復習</span>` : "";

  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="meta">
      <span class="q-counter">問題 ${idx + 1} / ${total} ${reviewBadge}</span>
      <span class="category-tag">${q.category}</span>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="choices">${choicesHTML}</div>
    ${explanationHTML}
    <div class="btn-row">
      ${answered ? `<button class="btn btn-primary" onclick="next()">${idx + 1 < total ? "次の問題 →" : "結果を見る"}</button>` : ""}
    </div>`;
}

function startQuiz() {
  mode = "quiz";
  current = 0; score = 0; wrongList = []; answered = false;
  window._selected = -1;
  isReview = false;
  render();
}

function selectAnswer(i) {
  if (answered) return;
  answered = true;
  window._selected = i;
  const q = isReview ? questions[reviewQueue[reviewIndex]] : questions[current];
  if (i === q.answer) {
    if (!isReview) score++;
  } else {
    const qi = isReview ? reviewQueue[reviewIndex] : current;
    if (!isReview && !wrongList.includes(qi)) wrongList.push(qi);
  }
  render();
}

function next() {
  answered = false;
  window._selected = -1;
  if (isReview) {
    reviewIndex++;
    if (reviewIndex >= reviewQueue.length) { mode = "review_done"; render(); return; }
  } else {
    current++;
    if (current >= questions.length) { mode = "result"; render(); return; }
  }
  render();
}

function startReview() {
  isReview = true;
  reviewQueue = [...wrongList];
  reviewIndex = 0;
  answered = false;
  window._selected = -1;
  mode = "quiz";
  render();
}

function resetQuiz() {
  mode = "start";
  current = 0; score = 0; wrongList = []; answered = false;
  isReview = false; reviewQueue = []; reviewIndex = 0;
  window._selected = -1;
  render();
}

window._selected = -1;
render();
</script>
</body>
</html>
